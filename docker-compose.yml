version: "3.9"

services:
  mongo:
    image: mongo:7
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  server:
    build:
      context: ./server
    restart: always
    environment:
      PORT: 5000
      MONGO_URI: mongodb://mongo:27017/collab-editor
      JWT_SECRET: change-me-in-production
      CLIENT_ORIGIN: http://localhost:3000
    ports:
      - "5000:5000"
    depends_on:
      - mongo

volumes:
  mongo_data:
